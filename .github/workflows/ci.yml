# CI Pipeline for BNDS PMS
# Badge: ![CI](https://github.com/${{ github.repository }}/actions/workflows/ci.yml/badge.svg)

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Vitest
        run: npx vitest run

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      # Dummy env vars for CI build (Prisma & Next.js require these at build time)
      DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
      DIRECT_URL: postgresql://fake:fake@localhost:5432/fake
      NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyFAKE
      SUPABASE_SERVICE_ROLE_KEY: eyFAKE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build with Next.js
        run: npm run build

  db-validate:
    name: Prisma Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Validate Schema
        run: npx prisma validate

      - name: Check for Schema Drift
        run: npx prisma generate --no-engine

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Dependency Audit
        run: npm audit --audit-level=high || true

      - name: Check for Known Vulnerabilities
        run: npx audit-ci --high

      - name: CodeQL Analysis
        if: github.event_name == 'push'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: CodeQL Autobuild
        if: github.event_name == 'push'
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Results
        if: github.event_name == 'push'
        uses: github/codeql-action/analyze@v3
